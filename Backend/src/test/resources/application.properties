spring.application.name=smartparking-test

# In-memory DB for tests (avoids requiring local MySQL)
spring.datasource.url=jdbc:h2:mem:smartparking_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create schema for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Do not run MySQL-oriented init scripts during tests
spring.sql.init.mode=never

# Keep server from binding to fixed port during tests
server.port=0

# JWT defaults for tests (JwtTokenProvider requires these)
app.jwt.secret=dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JTbWFydFBhcmtpbmdBcHBsaWNhdGlvbjIwMjY=
app.jwt.expiration-ms=86400000

# Match main app seed keys (required for DataSeeder in @SpringBootTest)
