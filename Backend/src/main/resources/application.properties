spring.application.name=smartparking

# MySQL only — start MySQL locally, then set e.g.:
#   export JDBC_DATABASE_PASSWORD='your-root-password'
# Optional: JDBC_DATABASE_URL, JDBC_DATABASE_USERNAME

# ========== MySQL Configuration ==========
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/smartparking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${JDBC_DATABASE_USERNAME:root}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== HikariCP Connection Pool (JawsDB Kitefin: 5 conns, 3600 queries/hour) ==========
# Keep pool small - JawsDB free/kitefin allows max 5 user connections AND throttles
# the user to 3600 queries per hour (max_questions). Every wasted query (SELECT 1
# health checks, idle keepalives, metrics polls) eats into that budget.
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:3}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:0}
# Drop idle connections quickly so we don't hold pool slots we don't need.
spring.datasource.hikari.idle-timeout=30000
# Recycle connections every 25 min (JawsDB/AWS may kill idle connections at 30 min)
spring.datasource.hikari.max-lifetime=1500000
# Wait max 20s for a connection from the pool before throwing an exception
spring.datasource.hikari.connection-timeout=20000
# Log a warning if a connection is held longer than 15s (detects leaks)
spring.datasource.hikari.leak-detection-threshold=15000
# Pool name for log clarity
spring.datasource.hikari.pool-name=SmartParkingPool
# DO NOT set connection-test-query: the MySQL JDBC4 driver uses Connection.isValid()
# (a protocol-level ping, NOT a real query) which doesn't count toward max_questions.
# Setting "SELECT 1" here would double our query count.
# spring.datasource.hikari.connection-test-query=SELECT 1
# Disable JMX MBeans - we don't scrape them and they add overhead.
spring.datasource.hikari.register-mbeans=false
# Auto-commit off - let Spring/JPA manage transactions
spring.datasource.hikari.auto-commit=false

# ========== JPA / Hibernate ==========
# In prod set DDL_AUTO=none to avoid Hibernate's per-startup table introspection
# (eats ~50+ queries against JawsDB's 3600/hr quota).
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Batch inserts/updates for DataSeeder performance (fewer round-trips)
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Use connection pool efficiently - release connection after each statement when not in a transaction
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
# Disable open-in-view to prevent holding connections for entire request lifecycle
spring.jpa.open-in-view=false

# ========== SQL Init ==========
# In prod set SQL_INIT_MODE=never so schema.sql doesn't re-run on every dyno cycle.
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.jpa.defer-datasource-initialization=true

# ========== JWT Configuration ==========
app.jwt.secret=${JWT_SECRET:dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JTbWFydFBhcmtpbmdBcHBsaWNhdGlvbjIwMjY=}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ========== Server ==========
server.port=${PORT:8080}

# ========== Actuator (connection pool monitoring) ==========
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
# Disable DB health probe — it issues a query every probe, eating into JawsDB's
# 3600 queries/hour budget. Use ping/disk-space only.
management.health.db.enabled=false
management.metrics.enable.hikaricp=false

# ========== Scheduler intervals (ms) ==========
# Master kill switch — set SCHEDULER_ENABLED=false in prod to stop ReservationScheduler
# entirely (great for staying under JawsDB quota during outages / debugging).
app.scheduler.enabled=${SCHEDULER_ENABLED:true}
# In production we override these to 5 min via env vars to stay under JawsDB's
# 3600 queries/hour quota. Locally the defaults give snappier behavior.
app.scheduler.complete-rate-ms=${SCHED_COMPLETE_MS:30000}
app.scheduler.no-show-rate-ms=${SCHED_NOSHOW_MS:60000}
app.scheduler.ending-soon-rate-ms=${SCHED_ENDING_MS:60000}

# ========== ALPR / Plate Recognizer ==========
# Prefer Backend/.env.local for local development; never commit real tokens.
app.alpr.url=${ALPR_URL:}
app.alpr.plate-recognizer.token=${PLATE_RECOGNIZER_TOKEN:}

# ========== Data Seeder ==========
# In prod set SEED_ENABLED=false to skip the heavy first-startup seeding (it
# fires hundreds of queries and trips JawsDB's 3600/hr quota on every restart).
app.seed.enabled=${SEED_ENABLED:true}
# Dev-only account passwords (not common dictionary / breach-list strings). Override in prod.
# Default matches docs / local UX; override in prod with SEED_ADMIN_PASSWORD
app.seed.admin-password=${SEED_ADMIN_PASSWORD:admin123}
app.seed.demo-user-password=${SEED_DEMO_USER_PASSWORD:SpLocal_User_7e4b1c8a2f6d!}
app.seed.owner-password=${SEED_OWNER_PASSWORD:SpLocal_Owner_5d9a3b7c1e8f!}
app.seed.guard-password=${SEED_GUARD_PASSWORD:SpLocal_Guard_6c8e2a9b1d7f!}
